      function useAccentVar() {
        useEffect(() => {
          const root = document.documentElement;
          const apply = () => {
            const dark = root.classList.contains("dark");
            root.style.setProperty("--accent", dark ? "#C5B4E3" : "#2D4A3E");
          };
          apply();
          const obs = new MutationObserver(apply);
          obs.observe(root, { attributes: true, attributeFilter: ["class"] });
          return () => obs.disconnect();
        }, []);
      }

      function ThemeToggle({ theme, setTheme }) {
        const dark = theme === "dark";
        return (
          <button
            onClick={() => setTheme(dark ? "light" : "dark")}
            className="mono text-[11px] uppercase tracking-[0.14em] text-muted dark:text-d-muted hover:text-ink dark:hover:text-d-ink transition-colors"
            aria-label={dark ? "Switch to light mode" : "Switch to dark mode"}
            title={dark ? "Switch to light mode" : "Switch to dark mode"}
          >
            {dark ? "light" : "dark"}
          </button>
        );
      }

              height={size}

      function HomeView({ navigate, portrait }) {
        const latest = LOG[0];
        const recentBooks = BOOKS.slice(0, 3);
        const syscribe = PROJECTS.find((p) => p.id === "syscribe");

        return (
          <React.Fragment>
            <section className="pt-6 pb-2">
              <div className="flex items-start gap-6 sm:gap-7">
                <div className="min-w-0 flex-1">
                  <h1 className="serif text-[36px] sm:text-[38px] font-medium tracking-tight leading-[1.1]">
                    Alex Lauderbaugh
                  </h1>
                  <p className="mono text-[12px] mt-2 text-muted dark:text-d-muted">
                    Product leader · Builder · Auckland
                  </p>
                </div>
                {portrait && portrait.show && (
                  <Portrait
                    size={112}
                    shape={portrait.shape}
                    style={portrait.style}
                    theme={portrait.theme}
                  />
                )}
              </div>
              <p className="mt-7 text-[17px] leading-[1.7] text-ink dark:text-d-ink max-w-[58ch]">
                {SITE.intro}
              </p>
              <p className="mt-5 text-[14px] text-muted dark:text-d-muted">
                {SITE.social.slice(0, 4).map((s, i) => (
                  <React.Fragment key={s.label}>
                    {i > 0 && <span className="mx-1.5 text-rule dark:text-d-rule">·</span>}
                    <a href={s.href} className="link hover:text-ink dark:hover:text-d-ink">{s.label}</a>
                  </React.Fragment>
                ))}
              </p>
            </section>

            <section className="mt-20">
              <h2 className="mono text-[11px] uppercase tracking-[0.18em] text-muted dark:text-d-muted mb-2">
                Latest
              </h2>
              <div className="border-t border-rule dark:border-d-rule">
                <LogEntry entry={latest} compact />
              </div>
              <ArrowLink onClick={() => navigate({ view: "log" })} className="mt-2">
                More from the log
              </ArrowLink>
            </section>

            <section className="mt-20">
              <h2 className="mono text-[11px] uppercase tracking-[0.18em] text-muted dark:text-d-muted mb-4">
                Building
              </h2>
              <div className="flex items-baseline justify-between gap-6 flex-wrap">
                <h3 className="serif text-[24px] font-medium tracking-tight">{syscribe.title}</h3>
                <div className="mono text-[11px] uppercase tracking-[0.14em] text-muted dark:text-d-muted">
                  {syscribe.status} · {syscribe.category} · {syscribe.weekMarker}
                </div>
              </div>
              <p className="text-[16px] mt-3 leading-[1.7] text-ink dark:text-d-ink max-w-[58ch]">
                {syscribe.summary} A small team of one, shipping in public against a twelve-week clock.
              </p>
              <ArrowLink onClick={() => navigate({ view: "project", id: syscribe.id })} className="mt-3">
                Syscribe
              </ArrowLink>
            </section>

            <section className="mt-20">
              <h2 className="mono text-[11px] uppercase tracking-[0.18em] text-muted dark:text-d-muted mb-4">
                Recently read
              </h2>
              <ul className="divide-y divide-rule dark:divide-d-rule border-t border-b border-rule dark:border-d-rule">
                {recentBooks.map((b) => (
                  <li key={b.id} className="py-4">
                    <div className="flex items-baseline justify-between gap-6 flex-wrap">
                      <div>
                        <span className="serif text-[18px] font-medium">{b.title}</span>
                        <span className="text-[14px] text-muted dark:text-d-muted ml-2">{b.author}</span>
                      </div>
                      <span className="mono text-[12px] text-accent dark:text-d-accent">{b.rating}</span>
                    </div>
                    <p className="text-[15px] mt-1.5 text-ink/85 dark:text-d-ink/85 max-w-[58ch]">{b.body[0]}</p>
                  </li>
                ))}
              </ul>
              <ArrowLink onClick={() => navigate({ view: "books" })} className="mt-4">
                All books
              </ArrowLink>
            </section>
          </React.Fragment>
        );
      }

      function LogView() {
        const [filter, setFilter] = useState("all");
        const filtered = useMemo(() => {
          if (filter === "all") return LOG;
          return LOG.filter((e) => e.type === filter);
        }, [filter]);
        return (
          <React.Fragment>
            <section className="pt-4 pb-8">
              <h1 className="serif text-[36px] font-medium tracking-tight">Log</h1>
              <p className="mt-3 text-[16px] leading-[1.7] text-muted dark:text-d-muted max-w-[58ch]">
                Everything I write, build, read, and ship. Reverse chronological, no categories that aren't earned.
              </p>
            </section>
            <div className="pb-2 border-b border-rule dark:border-d-rule">
              <FilterRow
                value={filter}
                onChange={setFilter}
                options={[
                  { value: "all", label: "All" },
                  { value: "build", label: "Building" },
                  { value: "book", label: "Books" },
                  { value: "note", label: "Notes" },
                  { value: "ship", label: "Ships" },
                ]}
              />
            </div>
            <div className="divide-y divide-rule dark:divide-d-rule">
              {filtered.map((entry) => (
                <LogEntry key={entry.id} entry={entry} />
              ))}
              {filtered.length === 0 && (
                <p className="py-12 text-[15px] text-muted dark:text-d-muted">
                  Nothing here yet under this filter.
                </p>
              )}
            </div>
          </React.Fragment>
        );
      }

      function ProjectsView({ navigate }) {
        const [filter, setFilter] = useState("all");
        const sorted = useMemo(() => {
          const list =
            filter === "all"
              ? PROJECTS
              : PROJECTS.filter((p) => p.category.toLowerCase() === filter);
          return [...list].sort(
            (a, b) => STATUS_ORDER.indexOf(a.status) - STATUS_ORDER.indexOf(b.status)
          );
        }, [filter]);
        return (
          <React.Fragment>
            <section className="pt-4 pb-8">
              <h1 className="serif text-[36px] font-medium tracking-tight">Projects</h1>
              <p className="mt-3 text-[16px] leading-[1.7] text-muted dark:text-d-muted max-w-[58ch]">
                Software and athletics, treated as peers. Each one has a deadline, an outcome that can be measured, and a plan that can be wrong.
              </p>
            </section>
            <div className="pb-2 border-b border-rule dark:border-d-rule">
              <FilterRow
                value={filter}
                onChange={setFilter}
                options={[
                  { value: "all", label: "All" },
                  { value: "software", label: "Software" },
                  { value: "athletics", label: "Athletics" },
                ]}
              />
            </div>
            <div>
              {sorted.map((p) => (
                <ProjectRow key={p.id} project={p} onOpen={(id) => navigate({ view: "project", id })} />
              ))}
            </div>
          </React.Fragment>
        );
      }

      function ProjectView({ id, navigate }) {
        const project = PROJECTS.find((p) => p.id === id) || PROJECTS[0];
        return (
          <React.Fragment>
            <button
              onClick={() => navigate({ view: "projects" })}
              className="arrow-link mono text-[12px] uppercase tracking-[0.14em] text-muted dark:text-d-muted hover:text-ink dark:hover:text-d-ink pt-2 mb-10"
            >
              <span className="arrow inline-block rotate-180">→</span>
              <span className="ml-1">Projects</span>
            </button>
            <header>
              <h1 className="serif text-[36px] font-medium tracking-tight leading-[1.1]">{project.title}</h1>
              <p className="mt-3 mono text-[12px] uppercase tracking-[0.14em] text-muted dark:text-d-muted">
                {project.status} · {project.category}
                {project.weekMarker && <span> · {project.weekMarker}</span>}
              </p>
              <p className="mt-4 text-[17px] leading-[1.7] text-ink dark:text-d-ink max-w-[58ch]">
                {project.summary}
              </p>
            </header>
            {project.currentFocus && project.currentFocus.length > 0 && (
              <aside className="mt-10 pl-5 border-l-2 border-accent dark:border-d-accent">
                <h2 className="mono text-[11px] uppercase tracking-[0.18em] text-accent dark:text-d-accent mb-2">
                  {project.category === "Athletics" ? "Training block" : "Current focus"}
                </h2>
                <ul className="space-y-2 text-[15px] leading-[1.65] text-ink dark:text-d-ink max-w-[58ch]">
                  {project.currentFocus.map((line, i) => (
                    <li key={i}>{line}</li>
                  ))}
                </ul>
              </aside>
            )}
            <section className="prose-body mt-12 text-[17px] text-ink dark:text-d-ink max-w-[58ch]">
              {project.body.map((node, i) =>
                node.kind === "h3" ? <h3 key={i}>{node.text}</h3> : <p key={i}>{node.text}</p>
              )}
            </section>
            {project.links && project.links.length > 0 && (
              <div className="mt-14 pt-6 border-t border-rule dark:border-d-rule">
                <h3 className="mono text-[11px] uppercase tracking-[0.18em] text-muted dark:text-d-muted mb-3">
                  Links
                </h3>
                <ul className="flex flex-wrap gap-x-5 gap-y-2 text-[14px]">
                  {project.links.map((l) => (
                    <li key={l.label}>
                      <a href={l.href} className="arrow-link inline-flex items-center gap-1.5 text-accent dark:text-d-accent hover:text-accent-hover dark:hover:text-d-accent-hover">
                        <span className="arrow">→</span>
                        {l.label}
                      </a>
                    </li>
                  ))}
                </ul>
              </div>
            )}
          </React.Fragment>
        );
      }

      function BooksView() {
        return (
          <React.Fragment>
            <section className="pt-4 pb-8">
              <h1 className="serif text-[36px] font-medium tracking-tight">Books</h1>
              <p className="mt-3 text-[16px] leading-[1.7] text-muted dark:text-d-muted max-w-[58ch]">
                What I've been reading, with the running counter. The rating is a single signal: would I re-read it, would I skim it, would I pass.
              </p>
              <p className="mt-4 mono text-[12px] text-accent dark:text-d-accent">
                {BOOKS.length} read this year · 14 total in 2026
              </p>
            </section>
            <div className="divide-y divide-rule dark:divide-d-rule border-t border-rule dark:border-d-rule">
              {BOOKS.map((b) => (
                <LogEntry key={b.id} entry={b} />
              ))}
            </div>
          </React.Fragment>
        );
      }

      function PrinciplesView() {
        const items = [
          { h: "The empty column is the most important column.", p: "Every roadmap I've shipped that held up left a deliberate space for what the market would do. Filling it in advance is the most common mistake I see." },
          { h: "Strategy is a verb.", p: "Slide decks are not strategy. Strategy is the set of decisions you've made about what not to do, and the experiments you've run to find out." },
          { h: "Customer interviews compound.", p: "Thirty conversations in is when the pattern starts being signal. Three is noise. The teams that skip the first twenty-seven build the wrong thing." },
          { h: "Pruning beats adding.", p: "Most product problems are excess. Most user complaints are about complexity, not missing features. The fastest improvement is usually a deletion." },
          { h: "Athletic discipline transfers.", p: "The thing I've learned from training that I use every day at work: the plan is the point. Adjust it, but never abandon it on a hard morning." },
          { h: "Write it down or it didn't happen.", p: "If a decision can't be recovered six months later from your own notes, the team will relitigate it. Cheap to write, expensive to skip." },
        ];
        return (
          <React.Fragment>
            <section className="pt-4 pb-10">
              <h1 className="serif text-[36px] font-medium tracking-tight">Principles</h1>
              <p className="mt-3 text-[16px] leading-[1.7] text-muted dark:text-d-muted max-w-[58ch]">
                Things I believe about product, building, and showing up — held loosely enough to be wrong.
              </p>
            </section>
            <ol className="space-y-10">
              {items.map((it, i) => (
                <li key={i} className="grid grid-cols-[40px_1fr] gap-6">
                  <span className="mono text-[12px] pt-1.5 text-muted dark:text-d-muted">
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <div>
                    <h3 className="serif text-[20px] font-medium leading-snug tracking-tight">{it.h}</h3>
                    <p className="mt-2 text-[16px] leading-[1.7] text-ink/90 dark:text-d-ink/90 max-w-[58ch]">{it.p}</p>
                  </div>
                </li>
              ))}
            </ol>
          </React.Fragment>
        );
      }

      function AboutView() {
        return (
          <React.Fragment>
            <section className="pt-4 pb-8">
              <h1 className="serif text-[36px] font-medium tracking-tight">About</h1>
            </section>
            <div className="prose-body text-[17px] text-ink dark:text-d-ink max-w-[58ch]">
              <p>I'm Alex. I lead product at BettrData, a data operations platform, and I'm solo-building Syscribe — an AI-powered documentation tool for teams that ship faster than they can write.</p>
              <p>I've been in product for twelve years across three companies, two countries, and one full career pivot. Auckland, NZ is home base since 2022. Before that, San Francisco for a decade.</p>
              <p>Outside of work I race on the track, train BJJ at a small gym in Mt Eden, and read more than I'll ever finish. This site is the public side of that — a log of what I'm building, what I'm learning, and what I'm wrong about.</p>
              <p>If you're an investor looking at Syscribe, or a founder thinking about senior product leadership, I'd love to talk. Email is the fastest way to reach me.</p>
            </div>
          </React.Fragment>
        );
      }

      // ─────────────────────────────────────────────────────────────────────────
      // App: router + theme
      // ─────────────────────────────────────────────────────────────────────────

      function App() {
        useAccentVar();

        const [theme, setTheme] = useState(() => {
          try { return localStorage.getItem("alex.theme") || "light"; } catch { return "light"; }
        });
        useEffect(() => {
          const root = document.documentElement;
          if (theme === "dark") root.classList.add("dark");
          else root.classList.remove("dark");
          try { localStorage.setItem("alex.theme", theme); } catch {}
        }, [theme]);

        const portrait = { show: true, style: "etch", shape: "rounded", theme };

        const [route, setRoute] = useState(() => {
          try {
            const saved = sessionStorage.getItem("alex.route");
            if (saved) return JSON.parse(saved);
          } catch {}
          return { view: "home" };
        });
        const navigate = useCallback((next) => {
          setRoute(next);
          try { sessionStorage.setItem("alex.route", JSON.stringify(next)); } catch {}
          window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
        }, []);

        useEffect(() => {
          let pending = false;
          const handler = (e) => {
            if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
            if (e.key === "g" && !pending) {
              pending = true;
              setTimeout(() => (pending = false), 800);
              return;
            }
            if (pending) {
              const map = { h: "home", l: "log", b: "books", p: "projects", r: "principles", a: "about" };
              if (map[e.key]) {
                navigate({ view: map[e.key] });
                pending = false;
              }
            }
          };
          window.addEventListener("keydown", handler);
          return () => window.removeEventListener("keydown", handler);
        }, [navigate]);

        let body;
        switch (route.view) {
          case "log": body = <LogView />; break;
          case "projects": body = <ProjectsView navigate={navigate} />; break;
          case "project": body = <ProjectView id={route.id} navigate={navigate} />; break;
          case "books": body = <BooksView />; break;
          case "principles": body = <PrinciplesView />; break;
          case "about": body = <AboutView />; break;
          case "home":
          default: body = <HomeView navigate={navigate} portrait={portrait} />;
        }

        return (
          <div className="min-h-screen">
            <div className="max-w-[720px] mx-auto px-6 sm:px-8">
              <Header route={route} navigate={navigate} theme={theme} setTheme={setTheme} />
            </div>
            <main>
              <PageShell route={route}>{body}</PageShell>
            </main>
            <div className="max-w-[720px] mx-auto px-6 sm:px-8">
              <Footer />
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
